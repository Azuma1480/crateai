name: Deploy CrateAI to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: crate-ai/package-lock.json
      - name: Install dependencies
        working-directory: crate-ai
        run: npm ci
      - name: Build
        working-directory: crate-ai
        run: npm run build
      - name: Prepare Claude UI site
        run: |
          mkdir -p site
          cp crateai.html site/index.html
          cp crate-ai/public/icon-192.png site/icon-192.png
          cp crate-ai/public/icon-512.png site/icon-512.png
          cp site-sw.js site/sw.js
          # New React app on the same origin at /app/ (shares localStorage
          # with the legacy prototype, enabling old-library auto-detect)
          cp -r crate-ai/dist site/app
          cat > site/manifest.webmanifest <<'EOF'
          {"name":"CrateAI","short_name":"CrateAI","start_url":"./","scope":"./","display":"standalone","background_color":"#0f0f0f","theme_color":"#7c3aed","icons":[{"src":"icon-192.png","sizes":"192x192","type":"image/png"},{"src":"icon-512.png","sizes":"512x512","type":"image/png"}]}
          EOF
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4